<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f8f1df">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="星芽岛">
  <title>星芽岛</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icon-180.png">
  <link rel="stylesheet" href="styles.css?v=1.3.2">
</head>
<body>
  <main class="app-shell" id="app">
<header class="topbar">
      <div>
        <h1 id="islandTitle">我的世界・自然小木屋岛</h1>
        <p>当前建设：<strong id="buildCount">0</strong> / <span id="buildMax">10</span></p>
      </div>
      <div class="daily-light" aria-label="今日星光进度">
        <span>今日星光</span>
        <strong id="dailyLight">0 / 4</strong>
      </div>
    </header>

<section class="workspace">
      <aside class="task-panel" aria-label="今日任务">
        <div class="task-panel-title">
          <span class="leaf">◆</span>
          <h2>今日任务</h2>
          <span class="leaf">◆</span>
        </div>
        <div id="taskList" class="task-list"></div>

      </aside>

      <section class="island-column">
        <div class="island-stage" id="islandStage">
          <div class="scene-world" id="sceneWorld" aria-label="从零开始建设的自然小木屋岛">
            <img class="scene-base" src="assets/island-base-zero.jpg" alt="等待建设的空白小岛">
            <div class="coherent-build-layer" id="natureBuildLayer" aria-hidden="true"></div>
          </div>

          <div class="robot-world" id="robotWorld" aria-label="火星机器人基地岛">
            <img class="scene-base" src="assets/coherent-robot-base.jpg" alt="等待建设的空白火星基地">
            <div class="coherent-build-layer" id="robotBuildLayer" aria-hidden="true"></div>
          </div>
          </div>

          <div class="coconut-world" id="coconutWorld" aria-label="椰子岛">
            <img class="scene-base" src="assets/coconut-island-base.jpg" alt="等待建设的椰子岛海面">
            <div class="coherent-build-layer" id="coconutBuildLayer" aria-hidden="true"></div>
          </div>
          <div class="rainforest-world" id="rainforestWorld" aria-label="雨林岛自由建造">
            <img class="scene-base rainforest-scene-base" src="assets/rainforest-island-base.jpg" alt="等待自由建造的空白雨林岛">
            <div class="rainforest-items-layer" id="rfItemsLayer"></div>

            <div class="rainforest-edit-toolbar" id="rfSelectionToolbar" hidden>
              <strong id="rfToolbarName">已选择素材</strong>
              <div class="rainforest-edit-actions">
                <button type="button" data-rf-action="grow" aria-label="放大">＋</button>
                <button type="button" data-rf-action="shrink" aria-label="缩小">－</button>
                <button type="button" data-rf-action="rotate-left" aria-label="向左旋转">↶</button>
                <button type="button" data-rf-action="rotate-right" aria-label="向右旋转">↷</button>
                <button type="button" data-rf-action="front" aria-label="向前一层">前</button>
                <button type="button" data-rf-action="back" aria-label="向后一层">后</button>
                <button type="button" data-rf-action="duplicate" aria-label="复制">⧉</button>
                <button type="button" data-rf-action="delete" class="rf-toolbar-delete" aria-label="删除">🗑</button>
              </div>
            </div>

            <div class="rainforest-stage-actions">
              <button type="button" id="rfUndoBtn">↶ 撤销</button>
              <button type="button" id="rfRedoBtn">↷ 恢复</button>
              <button type="button" id="rfOpenLibraryBtn" class="rf-library-primary">
                🌿 素材库
                <span id="rfUnlockedBadge">12 / 80</span>
              </button>
              <button type="button" id="rfSaveBtn">💾 保存</button>
            </div>
          </div>
          <div id="growthLayer" class="growth-layer" aria-hidden="true"></div>
          <div class="build-stage-badge" id="buildStageBadge">
            <span id="buildStageIcon">🌱</span>
            <strong id="buildStageName">荒地起步</strong>
          </div>

          <button class="scene-hotspot library-hotspot" data-place="树洞图书馆" aria-label="查看树洞图书馆"></button>
          <button class="scene-hotspot cottage-hotspot" data-place="自然小木屋" aria-label="查看自然小木屋"></button>
          <button class="scene-hotspot slide-hotspot" data-place="彩虹滑梯" aria-label="查看彩虹滑梯"></button>
          <button class="scene-hotspot robot-hotspot robot-energy-hotspot" data-place="充电花园" aria-label="查看机器人岛充电花园"></button>
          <button class="scene-hotspot robot-hotspot robot-buddies-hotspot" data-place="机械小伙伴" aria-label="查看机器人岛机械小伙伴"></button>
          <button class="scene-hotspot robot-hotspot robot-drone-hotspot" data-place="星星快递无人机" aria-label="查看机器人岛星星快递无人机"></button>

          <div class="scene-tip" id="sceneTip">完成今日任务，让小岛一点点成长</div>
        </div>

        <nav class="bottom-nav" aria-label="主导航">
          <button class="nav-button" id="mapBtn" type="button">
            <span class="nav-icon">🗺️</span>
            <span>岛屿地图</span>
          </button>
          <button class="nav-button" id="logBtn" type="button">
            <span class="nav-icon" id="logBtnIcon">✨</span>
            <span id="logBtnText">建设记录</span>
          </button>
          <button class="nav-button" id="parentBtn" type="button" aria-label="长按两秒进入家长设置">
            <span class="nav-icon">👨‍👩‍👧</span>
            <span>家长设置</span>
          </button>
        </nav>
      </section>
    </section>



  </main>

  <div class="modal-backdrop" id="modalBackdrop" hidden></div>

  <section class="modal task-modal" id="taskModal" role="dialog" aria-modal="true" aria-labelledby="taskModalTitle" hidden>
    <button class="modal-close" data-close-modal aria-label="关闭">×</button>
    <div class="modal-hero-icon" id="taskModalIcon">📋</div>
    <p class="eyebrow">今日任务</p>
    <h2 id="taskModalTitle">任务名称</h2>
    <p id="taskModalDescription" class="modal-description"></p>
    <div class="task-progress-large">
      <span id="taskModalProgress">0 / 1</span>
      <div class="progress-track"><span id="taskModalProgressBar"></span></div>
    </div>
    <button class="primary-button" id="completeTaskBtn" type="button">我完成啦</button>
  </section>

  <section class="modal wide-modal" id="mapModal" role="dialog" aria-modal="true" aria-labelledby="mapModalTitle" hidden>
    <button class="modal-close" data-close-modal aria-label="关闭">×</button>
    <p class="eyebrow">星芽群岛</p>
    <h2 id="mapModalTitle">岛屿地图</h2>
    <div class="island-map-grid">
      <button class="island-card current" id="natureIslandCard" data-island="nature" type="button">
        <div class="island-card-art">🏡</div>
        <h3>自然小木屋岛</h3>
        <p id="natureIslandDescription">当前建设中的成长世界</p>
        <span id="natureIslandStatus">建设中</span>
      </button>
      <button class="island-card locked" id="robotIslandCard" data-island="robot" type="button">
        <div class="island-card-art">🤖</div>
        <h3>火星机器人基地岛</h3>
        <p id="robotIslandDescription">完成自然小木屋岛后解锁</p>
        <span id="robotIslandStatus">尚未解锁</span>
      </button>
      <button class="island-card locked" id="coconutIslandCard" data-island="coconut" type="button" disabled>
        <div class="island-card-art">🥥</div>
        <h3>椰子岛</h3>
        <p id="coconutIslandDescription">完成火星机器人基地岛后解锁</p>
        <span id="coconutIslandStatus">尚未解锁</span>
      </button>
      <button class="island-card locked" id="rainforestIslandCard" data-island="rainforest" type="button" disabled>
        <div class="island-card-art">🌧️</div>
        <h3>雨林岛</h3>
        <p id="rainforestIslandDescription">完成椰子岛后解锁</p>
        <span id="rainforestIslandStatus">尚未解锁</span>
      </button>
    </div>
  </section>

  <section class="modal wide-modal" id="logModal" role="dialog" aria-modal="true" aria-labelledby="logModalTitle" hidden>
    <button class="modal-close" data-close-modal aria-label="关闭">×</button>
    <p class="eyebrow">每一点努力都会留下来</p>
    <h2 id="logModalTitle">建设记录</h2>
    <div id="logList" class="log-list"></div>
  </section>

  <section class="modal wide-modal rainforest-library-modal" id="rfLibraryModal" role="dialog" aria-modal="true" aria-labelledby="rfLibraryModalTitle" hidden>
    <button class="modal-close" data-close-modal aria-label="关闭">×</button>
    <p class="eyebrow">已解锁的素材可以无限重复使用</p>
    <h2 id="rfLibraryModalTitle">雨林素材库</h2>

    <div class="rf-library-summary">
      <span>已解锁</span>
      <strong id="rfLibraryUnlockedTotal">12 / 80</strong>
      <div class="progress-track"><span id="rfLibraryProgressBar"></span></div>
    </div>

    <div class="rf-modal-category-row" id="rfCategoryRow"></div>
    <div class="rf-modal-variant-grid" id="rfVariantRow"></div>
  </section>

  <section class="modal wide-modal rainforest-progress-modal" id="rainforestProgressModal" role="dialog" aria-modal="true" aria-labelledby="rainforestProgressTitle" hidden>
    <button class="modal-close" data-close-modal aria-label="关闭">×</button>
    <p class="eyebrow">在雨林岛完成任意任务会随机解锁新素材</p>
    <h2 id="rainforestProgressTitle">雨林建设进度</h2>

    <div class="rainforest-progress-hero">
      <div>
        <span>素材总进度</span>
        <strong id="rfProgressTotal">12 / 80</strong>
      </div>
      <div class="progress-track"><span id="rfProgressBar"></span></div>
      <p id="rfProgressTip">在雨林岛每完成一次任务，从尚未解锁的素材中随机获得一个。</p>
    </div>

    <div class="rainforest-category-progress" id="rfCategoryProgress"></div>

    <div class="rainforest-progress-actions">
      <button class="primary-button compact" id="rfProgressOpenLibrary" type="button">打开素材库</button>
      <button class="secondary-button" id="rfClearPlacedItems" type="button">清空已摆放素材</button>
    </div>
  </section>

  <section class="modal parent-modal" id="parentModal" role="dialog" aria-modal="true" aria-labelledby="parentModalTitle" hidden>
    <button class="modal-close" data-close-modal aria-label="关闭">×</button>
    <p class="eyebrow">家长区域</p>
    <h2 id="parentModalTitle">任务设置</h2>

    <form id="taskForm" class="task-form">
      <label>
        任务名称
        <input id="taskTitleInput" maxlength="18" placeholder="例如：阅读 15 分钟" required>
      </label>
      <label>
        鼓励说明
        <input id="taskSubtitleInput" maxlength="28" placeholder="例如：让故事树长出新叶">
      </label>
      <div class="form-row">
        <label>
          图标
          <select id="taskIconInput">
            <option>📚</option>
            <option>🧮</option>
            <option>🔤</option>
            <option>🎒</option>
            <option>💧</option>
            <option>🪵</option>
            <option>🎁</option>
            <option>⭐</option>
          </select>
        </label>
        <label>
          目标次数
          <input id="taskTargetInput" type="number" min="1" max="99" value="1" inputmode="numeric">
        </label>
        <label>
          任务类型
          <select id="taskKindInput">
            <option value="fixed">固定任务</option>
            <option value="temporary">临时任务</option>
          </select>
        </label>
      </div>
      <button class="primary-button compact" type="submit">添加任务</button>
    </form>

    <div class="parent-task-list" id="parentTaskList"></div>

    <div class="parent-actions">
      <button class="secondary-button" id="resetTodayBtn" type="button">重置今日进度</button>
      <button class="danger-button" id="restoreDefaultBtn" type="button">清除全部进度</button>
    </div>
  </section>

  <div class="celebration" id="celebration" aria-hidden="true">
    <span>✨</span><span>🌟</span><span>🍃</span><span>🌼</span><span>✨</span>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="app.js?v=1.3.2"></script>
  <script src="rainforest.js?v=1.3.2"></script>
</body>
</html>
