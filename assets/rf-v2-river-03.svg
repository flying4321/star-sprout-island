  <filter id="shadow" x="-30%" y="-30%" width="160%" height="170%">
    <feDropShadow dx="0" dy="9" stdDeviation="8" flood-color="#12382d" flood-opacity=".30"/>
  </filter>
  <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="5"/>
  </filter>
</defs>

<g filter="url(#shadow)" stroke-linecap="round" stroke-linejoin="round">
<path d="M150 -40 C170 105 355 130 340 270 C325 390 225 450 255 555" fill="none" stroke="#bd9754" stroke-width="118"/><path d="M150 -40 C170 105 355 130 340 270 C325 390 225 450 255 555" fill="none" stroke="#7f653d" stroke-width="104" opacity=".5"/><path d="M150 -40 C170 105 355 130 340 270 C325 390 225 450 255 555" fill="none" stroke="url(#water)" stroke-width="88"/><path d="M150 -40 C170 105 355 130 340 270 C325 390 225 450 255 555" fill="none" stroke="#baf2f5" stroke-width="8.8" opacity=".55"/><ellipse cx="70" cy="90" rx="12" ry="8" fill="#9f936f" opacity=".85"/><ellipse cx="153" cy="199" rx="16" ry="11" fill="#9f936f" opacity=".85"/><ellipse cx="236" cy="308" rx="20" ry="8" fill="#9f936f" opacity=".85"/><ellipse cx="319" cy="417" rx="12" ry="11" fill="#9f936f" opacity=".85"/><ellipse cx="402" cy="176" rx="16" ry="8" fill="#9f936f" opacity=".85"/><ellipse cx="95" cy="285" rx="20" ry="11" fill="#9f936f" opacity=".85"/>
