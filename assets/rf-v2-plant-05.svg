<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
<title id="title">雨林灌木</title>
<desc id="desc">星芽岛雨林素材：雨林灌木</desc>

<defs>
  <linearGradient id="water" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#65d6e8"/><stop offset=".55" stop-color="#208ec5"/><stop offset="1" stop-color="#14599e"/>
  </linearGradient>
  <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#8ed84c"/><stop offset=".55" stop-color="#3b9f3d"/><stop offset="1" stop-color="#176b38"/>
  </linearGradient>
  <linearGradient id="leafDark" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#4eb44a"/><stop offset="1" stop-color="#0e5638"/>
  </linearGradient>
  <linearGradient id="wood" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#6c3e21"/><stop offset=".5" stop-color="#a96b35"/><stop offset="1" stop-color="#4c2b1a"/>
  </linearGradient>
  <linearGradient id="mud" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#9b7044"/><stop offset=".6" stop-color="#704728"/><stop offset="1" stop-color="#4b301f"/>
  </linearGradient>
  <linearGradient id="drop" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#f1ffff" stop-opacity=".98"/><stop offset=".45" stop-color="#75d8f2" stop-opacity=".9"/><stop offset="1" stop-color="#258dcc" stop-opacity=".9"/>
  </linearGradient>
  <filter id="shadow" x="-30%" y="-30%" width="160%" height="170%">
    <feDropShadow dx="0" dy="9" stdDeviation="8" flood-color="#12382d" flood-opacity=".30"/>
  </filter>
  <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="5"/>
  </filter>
</defs>

<g filter="url(#shadow)" stroke-linecap="round" stroke-linejoin="round">
<ellipse cx="256" cy="430" rx="175" ry="24" fill="#2f6635" opacity=".35"/><circle cx="170" cy="345" r="65" fill="#3c9945" stroke="#225b33" stroke-width="7"/><circle cx="245" cy="295" r="75" fill="#4dac4e" stroke="#225b33" stroke-width="7"/><circle cx="330" cy="350" r="70" fill="#368e42" stroke="#225b33" stroke-width="7"/><circle cx="270" cy="385" r="55" fill="#58b74f" stroke="#225b33" stroke-width="7"/>
</g>
</svg>
