<g filter="url(#shadow)" stroke-linecap="round" stroke-linejoin="round">
<g transform="translate(256 250) rotate(0) scale(1.4)"><path d="M0 -48 C18 -20 35 2 35 23 C35 47 19 64 0 64 C-19 64 -35 47 -35 23 C-35 2 -18 -20 0 -48Z" fill="url(#drop)" stroke="#267bad" stroke-width="5"/><ellipse cx="-10" cy="12" rx="8" ry="17" fill="#fff" opacity=".65"/></g>
