  </filter>
</defs>

<g filter="url(#shadow)" stroke-linecap="round" stroke-linejoin="round">
<ellipse cx="230" cy="300" rx="78" ry="110" fill="#232c31" stroke="#171b1d" stroke-width="9"/><circle cx="245" cy="205" r="58" fill="#232c31" stroke="#171b1d" stroke-width="9"/><path d="M285 190 C360 145 445 170 438 225 C370 250 330 245 280 226 Z" fill="#f6a43c" stroke="#543424" stroke-width="9"/><path d="M305 210 H420" stroke="#e74f45" stroke-width="12"/><path d="M195 355 L145 455 L235 385" fill="#314a57" stroke="#171b1d" stroke-width="8"/><path d="M205 275 Q250 245 280 282 L275 365 Q225 380 205 340Z" fill="#fff2cd"/><circle cx="260" cy="195" r="9" fill="#fff"/><circle cx="262" cy="196" r="4" fill="#111"/>
